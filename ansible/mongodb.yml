---
- name: Install and configure MongoDB on private database server
  hosts: db
  become: yes

  vars:
    mongo_db_name: travelmemory
    mongo_user: traveluser
    mongo_password: TravelMemory@123

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - gnupg
          - curl
          - ca-certificates
        state: present

    - name: Add MongoDB GPG key
      shell: |
        curl -fsSL https://pgp.mongodb.com/server-7.0.asc | gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg
      args:
        creates: /usr/share/keyrings/mongodb-server-7.0.gpg

    - name: Add MongoDB repository
      copy:
        dest: /etc/apt/sources.list.d/mongodb-org-7.0.list
        content: |
          deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse

    - name: Update apt cache after MongoDB repo
      apt:
        update_cache: yes

    - name: Install MongoDB
      apt:
        name: mongodb-org
        state: present

    - name: Configure MongoDB bind IP
      lineinfile:
        path: /etc/mongod.conf
        regexp: '^  bindIp:'
        line: '  bindIp: 0.0.0.0'

    - name: Start and enable MongoDB
      service:
        name: mongod
        state: started
        enabled: yes

    - name: Create MongoDB application user
      shell: |
        mongosh <<EOF
        use {{ mongo_db_name }}
        db.createUser({
          user: "{{ mongo_user }}",
          pwd: "{{ mongo_password }}",
          roles: [
            { role: "readWrite", db: "{{ mongo_db_name }}" }
          ]
        })
        EOF
      ignore_errors: yes
